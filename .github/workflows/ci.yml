name: WebGoat CI

on:
  push:
    branches: main
  pull_request:
    branches: main 

jobs:

  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'adopt'
        
    - name: Build with Maven
      run: mvn clean install
      
    - name: Run WebGoat
      run: mvn tomcat7:run-war
      
    - name: Run WebWolf  
      run: mvn tomcat7:run-war@webwolf
      
    - name: Run Tests
      run: mvn test
