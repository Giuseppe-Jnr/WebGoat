name: WebGoat CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 25
        uses: actions/setup-java@v2
        with:
          java-version: '25'

      - name: Build with Maven
        run: mvnw clean install

      - name: Run tests
        run: mvnw test

      - name: Run WebGoat
        run: |
          export TZ=Europe/Amsterdam
          java -Dfile.encoding=UTF-8 -jar target/webgoat-2023.8.jar &
          sleep 10 # Attendre que l'application démarre
          curl http://localhost:8080/WebGoat/ # Vérifier que l'application est accessible
